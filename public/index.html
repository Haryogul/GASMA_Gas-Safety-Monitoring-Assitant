<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GASMA - Gas Safety Monitoring Assistant</title>
    
    <link rel="stylesheet" href="/build/assets/app.css" id="vite-css">
</head>
<body class="bg-gray-100 p-6">

    <div class="container mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6">GASMA Dashboard Monitoring</h1>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <canvas id="revenueChart" data-labels='["Jan", "Feb", "Mar", "Apr"]' data-data='[10, 20, 30, 40]'></canvas>
        </div>

        <div class="bg-white p-4 rounded-lg shadow">
            <canvas id="profitChart" data-labels='["Jan", "Feb", "Mar", "Apr"]' data-sales='[15, 25, 35, 45]' data-revenue='[20, 30, 40, 50]'></canvas>
        </div>
    </div>

    <script type="module" src="/build/assets/app.js"></script>
</body>
</html>
